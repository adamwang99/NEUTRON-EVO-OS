name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest watchdog

      - name: Lint check (no credentials in code)
        run: |
          # Fail if hardcoded secrets (value present, not just variable name).
          # Excludes: variable declarations (api_key= without value),
          # env vars (os.environ.get, getenv), and example/stub/pattern files.
          if grep -r --include="*.sh" \
            "api[_-]key\s*=\s*['\"][^'\"]" . 2>/dev/null; then
            echo "ERROR: Possible credential in shell script"
            exit 1
          fi
          # For Python: only flag string literals with realistic-looking keys
          # (sk-, ghp_, xoxb- prefixes indicate real credentials)
          if grep -r --include="*.py" \
            '"(sk-[a-zA-Z0-9]{20,}|ghp_[a-zA-Z0-9]{20,}|xox[baprs]-[a-zA-Z0-9]{10,})"' \
            . 2>/dev/null | grep -v "example\|stub\|pattern\|check-credentials"; then
            echo "ERROR: Possible credential pattern in Python"
            exit 1
          fi

      - name: Run tests
        run: python3 -m pytest tests/ -v --tb=short

      - name: GitHub Actions marker
        run: echo "CI ran at $(date)"
